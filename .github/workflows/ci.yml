name: CI

# Regression gate: runs the fast deterministic suites on every PR and on pushes
# to main, blocking merge when existing behavior breaks. The heavier device,
# hosted, and Maestro suites run on their own schedules, not here.
on:
  pull_request:
  push:
    branches:
      - main

# A newer push to the same ref supersedes an in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fast-checks:
    name: Fast checks (typecheck + intents + unit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm test
        run: npm test

  backend-tests:
    name: Backend tests (Deno capture-intake)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Deno edge-function tests
        run: npm run test:url-evidence
