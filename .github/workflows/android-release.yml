name: Android release APK

on:
  push:
    tags:
      - "android-*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      EXPO_PUBLIC_SUPABASE_URL: https://cbugerqzxthftiyqmyij.supabase.co
      EXPO_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_zbORQzKEBkA1zqIvxvDU1g_PameZjMO
      PRECIOUS_API_URL: https://cbugerqzxthftiyqmyij.supabase.co/functions/v1/capture-intake

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0" "ndk;27.1.12297006" "cmake;3.22.1"

      - name: Install dependencies
        run: npm ci

      - name: Fast checks
        run: npm test

      - name: Generate Android debug keystore
        run: |
          keytool -genkeypair \
            -v \
            -storetype JKS \
            -keystore android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Build hosted release APK
        run: npm run android:build:hosted

      - name: Name APK
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk "precious-captures-${GITHUB_REF_NAME}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: precious-captures-${{ github.ref_name }}.apk
          name: Precious Captures ${{ github.ref_name }}
          body: |
            Hosted Android release APK for Precious Captures.

            Supabase project: cbugerqzxthftiyqmyij
            Build path: android/app/build/outputs/apk/release/app-release.apk
