apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

def projectRoot = rootDir.getAbsoluteFile().getParentFile().getAbsolutePath()
def preciousApiUrl = (findProperty("PRECIOUS_API_URL") ?: System.getenv("PRECIOUS_API_URL") ?: "").toString()
def supabaseUrl = (findProperty("EXPO_PUBLIC_SUPABASE_URL") ?: System.getenv("EXPO_PUBLIC_SUPABASE_URL") ?: "").toString()
def supabaseAnonKey = (findProperty("EXPO_PUBLIC_SUPABASE_ANON_KEY") ?: System.getenv("EXPO_PUBLIC_SUPABASE_ANON_KEY") ?: "").toString()
// Version is injected by CI from the release tag (versionName) and the CI build
// counter (versionCode). The hardcoded fallbacks below are only for local dev
// builds, where the exact version does not matter.
def resolvedVersionName = (findProperty("PRECIOUS_VERSION_NAME") ?: System.getenv("PRECIOUS_VERSION_NAME") ?: "0.1.0").toString()
def resolvedVersionCode = (findProperty("PRECIOUS_VERSION_CODE") ?: System.getenv("PRECIOUS_VERSION_CODE") ?: "1").toString().toInteger()

react {
  entryFile = file(["node", "-e", "require('expo/scripts/resolveAppEntry')", projectRoot, "android", "absolute"].execute(null, rootDir).text.trim())
  reactNativeDir = new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile()
  hermesCommand = new File(["node", "--print", "require.resolve('hermes-compiler/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim()).getParentFile().getAbsolutePath() + "/hermesc/%OS-BIN%/hermesc"
  codegenDir = new File(["node", "--print", "require.resolve('@react-native/codegen/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile()
  cliFile = new File(["node", "--print", "require.resolve('@expo/cli', { paths: [require.resolve('expo/package.json')] })"].execute(null, rootDir).text.trim())
  bundleCommand = "export:embed"
  autolinkLibrariesWithApp()
}

android {
  ndkVersion rootProject.ext.ndkVersion
  buildToolsVersion rootProject.ext.buildToolsVersion
  compileSdk rootProject.ext.compileSdkVersion

  namespace "com.preciouscaptures"
  defaultConfig {
    applicationId "com.preciouscaptures"
    minSdkVersion rootProject.ext.minSdkVersion
    targetSdkVersion rootProject.ext.targetSdkVersion
    versionCode resolvedVersionCode
    versionName resolvedVersionName
    buildConfigField "String", "REACT_NATIVE_RELEASE_LEVEL", "\"${findProperty('reactNativeReleaseLevel') ?: 'stable'}\""
    buildConfigField "String", "PRECIOUS_API_URL", "\"${preciousApiUrl.replace("\\", "\\\\").replace("\"", "\\\"")}\""
    buildConfigField "String", "SUPABASE_URL", "\"${supabaseUrl.replace("\\", "\\\\").replace("\"", "\\\"")}\""
    buildConfigField "String", "SUPABASE_ANON_KEY", "\"${supabaseAnonKey.replace("\\", "\\\\").replace("\"", "\\\"")}\""
  }

  signingConfigs {
    debug {
      storeFile file("debug.keystore")
      storePassword "android"
      keyAlias "androiddebugkey"
      keyPassword "android"
    }
  }

  buildTypes {
    debug {
      signingConfig signingConfigs.debug
    }
    release {
      signingConfig signingConfigs.debug
      minifyEnabled false
      shrinkResources false
      proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
    }
  }
}

dependencies {
  implementation("com.facebook.react:react-android")
  implementation("androidx.browser:browser:1.6.0")
  implementation("androidx.appcompat:appcompat:1.7.0")
  implementation("androidx.core:core-ktx:1.13.1")
  implementation("androidx.work:work-runtime-ktx:2.9.1")
  testImplementation("junit:junit:4.13.2")

  if (hermesEnabled.toBoolean()) {
    implementation("com.facebook.react:hermes-android")
  }
}
