appId: com.preciouscaptures
name: 02 search
# Searches the seeded captures by prefix; zero LLM. The session is injected via the
# deep-link callback before this flow runs, so there is no UI sign-in.
---
- launchApp
- assertVisible:
    id: "pc.home.captures"
- tapOn:
    id: "pc.home.search"
- assertVisible:
    id: "pc.search.input"
- inputText: "${PRECIOUS_E2E_PREFIX}"
# The seeded captures (titles carry the prefix) surface in results.
- assertVisible:
    text: ".*${PRECIOUS_E2E_PREFIX}.*"
