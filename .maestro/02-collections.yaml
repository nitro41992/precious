appId: com.preciouscaptures
name: 02 collections
---
- launchApp
- assertVisible: "Precious Captures"
- runFlow:
    when:
      visible: "Sign in"
    commands:
      - tapOn:
          id: "pc.auth.email"
      - inputText: "${PRECIOUS_E2E_EMAIL}"
      - tapOn:
          id: "pc.auth.password"
      - inputText: "${PRECIOUS_E2E_PASSWORD}"
      - hideKeyboard
      - tapOn:
          id: "pc.auth.sign-in"
          enabled: true
      - runFlow: dismiss-password-save.yaml
      - assertVisible:
          id: "pc.home.captures"
- tapOn:
    id: "pc.home.collections"
- tapOn:
    id: "pc.collection.add"
- tapOn:
    id: "pc.collection.title"
- inputText: "Maestro Regression"
- tapOn:
    id: "pc.collection.description"
- inputText: "Created by the mobile E2E smoke suite"
- hideKeyboard
- tapOn:
    id: "pc.collection.save"
    enabled: true
- assertVisible: "Maestro Regression"
