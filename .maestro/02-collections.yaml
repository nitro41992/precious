appId: com.preciouscaptures
name: 02 search
---
- launchApp
- runFlow:
    when:
      visible: "Sign in"
    commands:
      - tapOn:
          id: "pc.auth.email"
      - inputText: "${PRECIOUS_E2E_EMAIL}"
      - tapOn:
          id: "pc.auth.password"
      - inputText: "${PRECIOUS_E2E_PASSWORD}"
      - hideKeyboard
      - tapOn:
          id: "pc.auth.sign-in"
          enabled: true
      - runFlow: dismiss-password-save.yaml
      - assertVisible:
          id: "pc.home.captures"
- assertVisible:
    id: "pc.home.captures"
- tapOn:
    id: "pc.home.search"
- assertVisible:
    id: "pc.search.input"
- inputText: "Maestro"
- assertVisible:
    text: "Maestro|No matches yet|Ready|Needs review|Analyzing"
