appId: com.preciouscaptures
name: 01 manual capture
# The ONE intentionally-real flow: it creates a real capture and hits the backend
# + OpenAI. Run only via `run-maestro-smoke --with-live-capture`, NOT in the
# default zero-LLM loop. The session is injected via the deep-link callback before
# this flow runs, so there is no UI sign-in.
---
- assertVisible:
    id: "pc.home.captures"
# The global FAB is the single "add capture" entry point on every tab.
- tapOn:
    id: "pc.nav.capture"
- tapOn:
    id: "pc.capture.source"
- inputText: "https://www.nps.gov/yose/planyourvisit/reservations.htm"
- hideKeyboard
- tapOn:
    id: "pc.capture.save"
    enabled: true
- assertVisible:
    text: "Saving|Analyzing|Ready|Needs review|Yosemite|nps.gov"
