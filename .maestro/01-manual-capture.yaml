appId: com.preciouscaptures
name: 01 manual capture
---
- launchApp
- runFlow:
    when:
      visible: "Sign in"
    commands:
      - tapOn:
          id: "pc.auth.email"
      - inputText: "${PRECIOUS_E2E_EMAIL}"
      - tapOn:
          id: "pc.auth.password"
      - inputText: "${PRECIOUS_E2E_PASSWORD}"
      - hideKeyboard
      - tapOn:
          id: "pc.auth.sign-in"
          enabled: true
      - runFlow: dismiss-password-save.yaml
      - assertVisible:
          id: "pc.home.captures"
- assertVisible:
    id: "pc.home.captures"
- tapOn:
    id: "pc.capture.open"
- tapOn:
    id: "pc.capture.source"
- inputText: "https://www.nps.gov/yose/planyourvisit/reservations.htm"
- hideKeyboard
- tapOn:
    id: "pc.capture.save"
    enabled: true
- assertVisible:
    text: "Saving|Analyzing|Ready|Needs review|Yosemite|nps.gov"
