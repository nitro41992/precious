appId: com.preciouscaptures
name: 00 sign in
---
- launchApp:
    clearState: true
- assertVisible: "Precious Captures"
- assertVisible: "Sign in"
- tapOn:
    id: "pc.auth.email"
- inputText: "${PRECIOUS_E2E_EMAIL}"
- tapOn:
    id: "pc.auth.password"
- inputText: "${PRECIOUS_E2E_PASSWORD}"
- hideKeyboard
- tapOn:
    id: "pc.auth.sign-in"
    enabled: true
- runFlow: dismiss-password-save.yaml
- assertVisible:
    id: "pc.home.captures"
