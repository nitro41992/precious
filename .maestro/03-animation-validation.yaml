appId: com.preciouscaptures
name: 03 animation validation
---
- assertVisible:
    id: "pc.home.captures"
- assertVisible:
    text: "review-e2e-.*choice"
- tapOn:
    text: "review-e2e-.*choice"
- assertVisible:
    text: "review-e2e-.*choice"
- tapOn: "Back"
- assertVisible:
    id: "pc.home.captures"
- tapOn:
    id: "pc.nav.collections"
# The FAB is globally "add capture"; collection creation now lives in an
# in-page "Add collection" pill on the Collections list banner.
- assertVisible:
    id: "pc.collections.add"
- assertVisible:
    text: "review-e2e-.*Suggested"
- tapOn:
    text: "review-e2e-.*Suggested"
- assertVisible:
    id: "pc.collection.detail.title"
- tapOn:
    id: "pc.collection.detail.edit"
- assertVisible: "Collection details"
- assertVisible:
    id: "pc.collection.edit.save"
- tapOn: "Close"
- assertVisible:
    id: "pc.collection.detail.title"
- tapOn: "Back"
- assertVisible: "Collections"
- tapOn:
    id: "pc.nav.recent"
- assertVisible:
    id: "pc.home.captures"
